name: build-3ds

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Pull devkitPro container
        run: |
          docker pull devkitpro/devkitarm:latest

      - name: Build project
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/project \
            -w /project \
            devkitpro/devkitarm:latest \
            bash -c "
              dkp-pacman -Syu --noconfirm &&
              dkp-pacman -S --noconfirm 3ds-dev &&
              make &&
              make cia
            "

      - name: Upload CIA
        uses: actions/upload-artifact@v4
        with:
          name: DrumMixer
          path: |
            DrumMixer.cia
            DrumMixer.3dsx
