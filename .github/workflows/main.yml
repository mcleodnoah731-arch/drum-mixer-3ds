name: build-3ds

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Pull 3DS build image
        run: docker pull greatwizard/devkitarm-3ds:latest

      - name: Build CIA + 3DSX (auto-find base_rules)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/project \
            -w /project/DrumMixer_FULL_CIA_BrowserBuild \
            greatwizard/devkitarm-3ds:latest \
            bash -lc '
              set -e

              export DEVKITPRO=/opt/devkitPro
              export DEVKITARM=/opt/devkitPro/devkitARM
              echo "DEVKITPRO=$DEVKITPRO"

              echo "== Revert Makefile to repo version (avoid double-patching) =="
              if [ -d /project/.git ]; then
                git checkout -- Makefile || true
              fi

              echo "== Locate base_rules in this container =="
              BASE_RULES=$(find "$DEVKITPRO" -maxdepth 8 \( -name base_rules -o -name base_rules.mk \) -type f 2>/dev/null | head -n 1 || true)
              echo "BASE_RULES=$BASE_RULES"
              if [ -z "$BASE_RULES" ]; then
                echo "ERROR: Could not find base_rules anywhere under $DEVKITPRO"
                echo "Tree (top levels):"
                find "$DEVKITPRO" -maxdepth 3 -type d | sed -n "1,200p"
                exit 1
              fi

              echo "== Write local include file that points to the real base_rules =="
              printf "include %s\n" "$BASE_RULES" > local_base_rules.mk
              cat local_base_rules.mk

              echo "== Patch Makefile to include local_base_rules.mk =="
              # Replace ANY devkitPro base_rules include with our local file (works across layouts)
              # If it does not exist, append it at the end as a fallback.
              if grep -q "base_rules" Makefile; then
                sed -i "s|^include .*base_rules.*$|include local_base_rules.mk|g" Makefile
                sed -i "s|^include .*base_rules\\.mk.*$|include local_base_rules.mk|g" Makefile
              else
                echo "" >> Makefile
                echo "include local_base_rules.mk" >> Makefile
              fi

              echo "== Confirm patched Makefile lines =="
              grep -n "local_base_rules.mk" -n Makefile || true
              grep -n "base_rules" -n Makefile || true

              echo "== Check tools =="
              which bannertool
              which makerom

              echo "== Build =="
              make
              make cia

              echo "== Outputs =="
              ls -la *.cia *.3dsx
            '

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DrumMixer-build
          path: |
            DrumMixer_FULL_CIA_BrowserBuild/*.cia
            DrumMixer_FULL_CIA_BrowserBuild/*.3dsx
