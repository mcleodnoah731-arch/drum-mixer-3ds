name: build-3ds

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Pull 3DS build image
        run: docker pull greatwizard/devkitarm-3ds:latest

      - name: Build CIA + 3DSX
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/project \
            -w /project/DrumMixer_FULL_CIA_BrowserBuild \
            greatwizard/devkitarm-3ds:latest \
            bash -lc '
              set -e

              export DEVKITPRO=/opt/devkitPro
              export DEVKITARM=/opt/devkitPro/devkitARM

              echo "DEVKITPRO=$DEVKITPRO"

              echo "== Patch Makefile for old devkitPro layout =="

              sed -i "s|include \$(DEVKITPRO)/libctru/base_rules|ifeq (\$(wildcard \$(DEVKITPRO)/libctru/base_rules),)\n  include \$(DEVKITPRO)/ctrulib/libctru/base_rules\nelse\n  include \$(DEVKITPRO)/libctru/base_rules\nendif|g" Makefile

              echo "== Show patched section =="
              grep -n base_rules Makefile || true

              echo "== Check tools =="
              which bannertool || true
              which makerom || true

              echo "== Build project =="
              make
              make cia

              echo "== Output files =="
              ls -la *.cia *.3dsx
            '

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DrumMixer-build
          path: |
            DrumMixer_FULL_CIA_BrowserBuild/*.cia
            DrumMixer_FULL_CIA_BrowserBuild/*.3dsx
