name: build-3ds

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Pull 3DS build image
        run: docker pull greatwizard/devkitarm-3ds:latest

      - name: Build CIA + 3DSX (hard patch Makefile)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/project \
            -w /project/DrumMixer_FULL_CIA_BrowserBuild \
            greatwizard/devkitarm-3ds:latest \
            bash -lc '
              set -e

              export DEVKITPRO=/opt/devkitPro
              export DEVKITARM=/opt/devkitPro/devkitARM
              echo "DEVKITPRO=$DEVKITPRO"
              echo "DEVKITARM=$DEVKITARM"

              # Find base_rules (your log shows it exists here)
              BASE_RULES=$(find "$DEVKITPRO" -maxdepth 8 -name base_rules -type f | head -n 1)
              echo "BASE_RULES=$BASE_RULES"
              [ -n "$BASE_RULES" ]

              # Create local include file
              printf "include %s\n" "$BASE_RULES" > local_base_rules.mk
              cat local_base_rules.mk

              echo "== BEFORE patch (relevant lines) =="
              grep -n "base_rules" Makefile || true

              echo "== Remove any existing base_rules ifeq block and includes =="
              # 1) Remove an ifeq...endif block that contains base_rules (common in your file now)
              #    This deletes from the first line matching 'ifeq' that also contains 'base_rules'
              #    through the next 'endif'.
              awk '
                BEGIN{skip=0}
                /ifeq/ && /base_rules/ {skip=1; next}
                skip==1 && /^endif/ {skip=0; next}
                skip==1 {next}
                {print}
              ' Makefile > Makefile.tmp && mv Makefile.tmp Makefile

              # 2) Remove any remaining single-line includes that reference base_rules
              grep -v "base_rules" Makefile > Makefile.tmp && mv Makefile.tmp Makefile

              echo "== Add our single include line near the top =="
              # Put it at line 1 so it definitely runs before rules
              (echo "include local_base_rules.mk"; cat Makefile) > Makefile.tmp && mv Makefile.tmp Makefile

              echo "== AFTER patch (top of Makefile) =="
              head -n 40 Makefile

              echo "== Check tools =="
              which bannertool
              which makerom

              echo "== Build =="
              make
              make cia

              echo "== Outputs =="
              ls -la *.cia *.3dsx
            '

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DrumMixer-build
          path: |
            DrumMixer_FULL_CIA_BrowserBuild/*.cia
            DrumMixer_FULL_CIA_BrowserBuild/*.3dsx
