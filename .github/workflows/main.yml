name: build-3ds

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Pull devkitPro container
        run: docker pull devkitpro/devkitarm:latest

      - name: Build project
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/project \
            -w /project/DrumMixer_FULL_CIA_BrowserBuild \
            devkitpro/devkitarm:latest \
            bash -lc '
              set -e

              # Auto-detect correct DEVKITPRO path (some images use /opt/devkitPro)
              if [ -d /opt/devkitPro ]; then
                export DEVKITPRO=/opt/devkitPro
              else
                export DEVKITPRO=/opt/devkitpro
              fi

              # devkitARM folder lives under DEVKITPRO
              export DEVKITARM=$DEVKITPRO/devkitARM

              echo "DEVKITPRO=$DEVKITPRO"
              echo "DEVKITARM=$DEVKITARM"

              echo "== Update + install required packages =="
              dkp-pacman -Syu --noconfirm
              dkp-pacman -S --noconfirm devkitARM libctru citro2d citro3d 3dstools tex3ds

              echo "== Check base_rules exists =="
              ls -la "$DEVKITPRO/libctru/base_rules"

              echo "== Install build deps for makerom/bannertool =="
              apt-get update
              apt-get install -y curl ca-certificates tar make gcc g++ libpng-dev

              echo "== Build bannertool (no git) =="
              (curl -L -o bannertool.tar.gz https://codeload.github.com/Steveice10/bannertool/tar.gz/refs/heads/main \
               || curl -L -o bannertool.tar.gz https://codeload.github.com/Steveice10/bannertool/tar.gz/refs/heads/master)
              tar -xzf bannertool.tar.gz
              cd bannertool-*
              make
              cp bannertool /usr/local/bin/
              cd /project/DrumMixer_FULL_CIA_BrowserBuild

              echo "== Build makerom (no git) =="
              (curl -L -o project_ctr.tar.gz https://codeload.github.com/3DSGuy/Project_CTR/tar.gz/refs/heads/main \
               || curl -L -o project_ctr.tar.gz https://codeload.github.com/3DSGuy/Project_CTR/tar.gz/refs/heads/master)
              tar -xzf project_ctr.tar.gz
              cd Project_CTR-*/makerom
              make
              cp makerom /usr/local/bin/
              cd /project/DrumMixer_FULL_CIA_BrowserBuild

              echo "== Build =="
              make
              make cia

              echo "== Outputs =="
              ls -la *.3dsx *.cia
            '

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DrumMixer
          path: |
            DrumMixer_FULL_CIA_BrowserBuild/*.cia
            DrumMixer_FULL_CIA_BrowserBuild/*.3dsx
