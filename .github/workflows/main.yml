name: build-3ds

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    # Image with 3DS tooling preinstalled (avoids pkg.devkitpro.org / dkp-pacman downloads)
    container:
      image: greatwizard/devkitarm-3ds:latest

    steps:
      - uses: actions/checkout@v4

      - name: Show tools (debug)
        run: |
          echo "DEVKITPRO=$DEVKITPRO"
          echo "DEVKITARM=$DEVKITARM"
          which arm-none-eabi-gcc || true
          which bannertool || true
          which makerom || true

      - name: Build 3dsx + cia
        run: |
          make
          make cia

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DrumMixer-build
          path: |
            DrumMixer.3dsx
            DrumMixer.cia
            README.txt
