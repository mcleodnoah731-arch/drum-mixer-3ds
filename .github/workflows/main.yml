name: build-3ds

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Pull 3DS build image
        run: docker pull greatwizard/devkitarm-3ds:latest

      - name: Build CIA + 3DSX inside container (symlink fix)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/project \
            -w /project/DrumMixer_FULL_CIA_BrowserBuild \
            greatwizard/devkitarm-3ds:latest \
            bash -lc '
              set -e

              export DEVKITPRO=/opt/devkitPro
              export DEVKITARM=/opt/devkitPro/devkitARM

              echo "DEVKITPRO=$DEVKITPRO"
              echo "DEVKITARM=$DEVKITARM"

              echo "== Locate libctru base_rules =="
              if [ -f "$DEVKITPRO/libctru/base_rules" ]; then
                echo "Found: $DEVKITPRO/libctru/base_rules"
              elif [ -f "$DEVKITPRO/ctrulib/libctru/base_rules" ]; then
                echo "Found old layout: $DEVKITPRO/ctrulib/libctru/base_rules"
                echo "Creating symlink: $DEVKITPRO/libctru -> $DEVKITPRO/ctrulib/libctru"
                rm -rf "$DEVKITPRO/libctru" || true
                ln -s "$DEVKITPRO/ctrulib/libctru" "$DEVKITPRO/libctru"
              else
                echo "ERROR: Could not find libctru base_rules anywhere."
                echo "Listing /opt/devkitPro:"
                ls -la /opt/devkitPro || true
                echo "Listing /opt/devkitPro/ctrulib (if exists):"
                ls -la /opt/devkitPro/ctrulib || true
                exit 1
              fi

              echo "== Verify base_rules now exists where Makefile expects =="
              ls -la "$DEVKITPRO/libctru/base_rules"

              echo "== Check makerom + bannertool (should be included) =="
              which bannertool || true
              which makerom || true

              echo "== Build =="
              make
              make cia

              echo "== Outputs =="
              ls -la *.3dsx *.cia
            '

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DrumMixer-build
          path: |
            DrumMixer_FULL_CIA_BrowserBuild/*.cia
            DrumMixer_FULL_CIA_BrowserBuild/*.3dsx
