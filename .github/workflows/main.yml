name: build-3ds

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    # Run everything inside devkitPro's toolchain container (no apt.devkitpro.org needed)
    container:
      image: devkitpro/devkitarm:latest

    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain info
        run: |
          echo "DEVKITPRO=$DEVKITPRO"
          echo "DEVKITARM=$DEVKITARM"
          which arm-none-eabi-gcc || true
          which dkp-pacman || true

      # Install 3DS libraries inside the container (uses dkp-pacman inside the image)
      - name: Install 3DS dev libraries
        run: |
          dkp-pacman -Syu --noconfirm
          dkp-pacman -S --noconfirm 3ds-dev

      - name: Build bannertool
        run: |
          git clone --depth 1 https://github.com/Steveice10/bannertool.git
          make -C bannertool
          cp bannertool/bannertool /usr/local/bin/

      - name: Build makerom
        run: |
          git clone --depth 1 https://github.com/3DSGuy/Project_CTR.git
          make -C Project_CTR/makerom
          cp Project_CTR/makerom/makerom /usr/local/bin/

      - name: Build 3dsx + cia
        run: |
          make
          make cia

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DrumMixer-build
          path: |
            DrumMixer.3dsx
            DrumMixer.cia
