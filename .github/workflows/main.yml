name: build-3ds

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Pull devkitPro container
        run: docker pull devkitpro/devkitarm:latest

      - name: Build project
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/project \
            -w /project/DrumMixer_FULL_CIA_BrowserBuild \
            devkitpro/devkitarm:latest \
            bash -lc "
              set -e

              # IMPORTANT: correct path casing in this container
              export DEVKITPRO=/opt/devkitPro
              export DEVKITARM=\$DEVKITPRO/devkitARM

              echo DEVKITPRO=\$DEVKITPRO
              ls -la \$DEVKITPRO || true
              ls -la \$DEVKITPRO/libctru || true

              dkp-pacman -Syu --noconfirm
              printf '\n' | dkp-pacman -S --noconfirm 3ds-dev

              make
              make cia
            "

      - name: Upload CIA
        uses: actions/upload-artifact@v4
        with:
          name: DrumMixer
          path: |
            DrumMixer_FULL_CIA_BrowserBuild/*.cia
            DrumMixer_FULL_CIA_BrowserBuild/*.3dsx
