name: build-3ds

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git cmake pkg-config libpng-dev

      - name: Install devkitPro
        run: |
          wget -qO- https://apt.devkitpro.org/install-devkitpro-pacman | sudo bash
          sudo dkp-pacman -Syu --noconfirm
          sudo dkp-pacman -S --noconfirm devkitARM 3ds-dev

      - name: Build bannertool
        run: |
          git clone https://github.com/Steveice10/bannertool.git
          cd bannertool
          make
          sudo cp bannertool /usr/local/bin/

      - name: Build makerom
        run: |
          git clone https://github.com/3DSGuy/Project_CTR.git
          cd Project_CTR/makerom
          make
          sudo cp makerom /usr/local/bin/

      - name: Build project
        env:
          DEVKITPRO: /opt/devkitpro
          DEVKITARM: /opt/devkitpro/devkitARM
        run: |
          make
          make cia

      - name: Upload CIA
        uses: actions/upload-artifact@v4
        with:
          name: DrumMixer
          path: |
            DrumMixer.cia
            DrumMixer.3dsx
